spring.application.name=Cardify

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cardify_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwtSecret=CardifySuperSecretKeyForJwtAuthenticationThatIsAtLeast32BytesLong123
app.jwtExpirationMs=86400000

# Server Configuration
server.address=0.0.0.0
server.port=8080